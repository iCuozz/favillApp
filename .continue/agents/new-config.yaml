# Configuration file for Continue (VS Code / JetBrains)
# Ottimizzato per MacBook Pro M5 (24GB RAM) & Sviluppo Locale via Ollama

name: Mac M5 Local Power Config
version: 1.0.0
schema: v1

# ==========================================
# 1. MODELLI PRINCIPALI (Chat & Refactoring)
# ==========================================
# Modelli usati nella barra laterale (Cmd+L) o per modifiche in linea (Cmd+I)
models:
  - name: Qwen 2.5 Coder 7B (Consigliato)
    provider: ollama
    model: qwen2.5-coder:7b
    roles:
      - chat
      - edit

  - name: Qwen 2.5 Coder 14B (Advanced - Più pesante)
    provider: ollama
    model: qwen2.5-coder:14b
    roles:
      - chat

# ==========================================
# 2. AUTOCOMPLETAMENTO (Tab)
# ==========================================
# Modello ultra-leggero e fulmineo per suggerirti il codice mentre digiti
tabAutocompleteModel:
  name: Qwen Coder 1.5B (Fast)
  provider: ollama
  model: qwen2.5-coder:1.5b

# AGGIUNGI QUESTO BLOCCO QUI SOTTO:
# Forza Continue a usare Qwen 7B per l'Agent Mode, ottimizzando l'uso dei tool MCP
agentModel:
  name: Qwen 2.5 Coder 7B (Agent)
  provider: ollama
  model: qwen2.5-coder:7b
# ==========================================
# 3. EMBEDDINGS (Indicizzazione Progetto)
# ==========================================
# Modello usato in background per mappare il tuo codice localmente
embeddingsProvider:
  provider: ollama
  model: nomic-embed-text

# ==========================================
# 4. CONTEXT PROVIDERS (Riferimenti Rapidi)
# ==========================================
# Scorciatoie per passare file o contesti all'IA usando il simbolo @
contextProviders:
  - name: codebase # Digita @codebase per fare domande strutturate su tutto il progetto
  - name: open     # Digita @open per fare riferimento ai file che hai attualmente aperti
  - name: file     # Digita @file per selezionare e includere un file specifico

# ==========================================
# 5. MCP SERVERS (Superpoteri in Agent Mode)
# ==========================================
# Estensioni attive quando usi l'IA in modalità "Agent" (icona del robot)
mcpServers:
  # Memoria semantica a lungo termine per ricordare le tue preferenze e linee guida
  - uses: anthropic/memory-mcp

  # Filesystem: Consente all'agente di creare, leggere e modificare file sul tuo Mac.
  # NOTA: Sostituisci "IL_TUO_NOME_UTENTE" con il nome della tua cartella home su macOS (lo trovi scrivendo 'whoami' nel terminale)
  - name: filesystem
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/Users/andreacuozzo/Projects" # Cambia con il percorso reale dei tuoi progetti
      - "/Users/andreacuozzo/Desktop"