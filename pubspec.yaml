name: favilla_app
description: Fumetto interattivo Favilla - Mamma con Superpoteri
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/sfx/
    - assets/fonts/
    - assets/splash/
    - assets/episodes/
    - assets/data/comic_data.json
    - assets/cover

  fonts:
    - family: Bangers
      fonts:
        - asset: assets/fonts/Bangers/Bangers-Regular.ttf
    - family: ComicNeue
      fonts:
        - asset: assets/fonts/Comic/Comic_Neue/ComicNeue-Regular.ttf
