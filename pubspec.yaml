name: favilla_app
description: Fumetto interattivo Favilla - Mamma con Superpoteri
publish_to: "none"
version: 1.0.6+9

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  in_app_review: ^2.0.9
  flutter_localizations:
    sdk: flutter
  intl: any
  sentry_flutter: ^9.19.0
  audioplayers: ^6.0.0
  flutter_tts: ^4.2.5
  http: ^1.6.0
  crypto: ^3.0.7
  uuid: ^4.5.3
  path_provider: ^2.1.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/comic_index.json
    - assets/data/quests/
    - assets/data/quests/s1/
    - assets/data/quests/s2/
    - assets/fonts/
    - assets/episodes/
    - assets/episodes/prologo/
    - assets/episodes/s1/
    - assets/episodes/s1/s1_mattina_dopo/
    - assets/episodes/s1/s1_ritorno_casa/
    - assets/episodes/s1/s1_scuola_1/
    - assets/episodes/s2/
    - assets/cover/
    - assets/audio/

  fonts:
    - family: Bangers
      fonts:
        - asset: assets/fonts/Bangers/Bangers-Regular.ttf
    - family: ComicNeue
      fonts:
        - asset: assets/fonts/Comic/Comic_Neue/ComicNeue-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#120812"
  image: assets/icon/app_icon.png
  android_12:
    color: "#120812"
    image: assets/icon/app_icon.png
    icon_background_color: "#120812"
  android: true
  ios: true
